name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Configure
        run: cmake -S lr4 -B lr4/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build lr4/build --config Release -- -j 2
      - name: Run tests (portable)
        run: |
          set -e
          # Prefer CTest (portable across generators and platforms)
          if command -v ctest >/dev/null 2>&1; then
            ctest --test-dir lr4/build --output-on-failure || true
          fi
          # Also try built targets directly if present
          if [ -x lr4/build/cpp/tests/Release/lr4_tests ]; then lr4/build/cpp/tests/Release/lr4_tests || true; fi
          if [ -x lr4/build/cpp/tests/lr4_tests ]; then lr4/build/cpp/tests/lr4_tests || true; fi
          if [ -x lr4/build/cpp/src/lr4 ]; then lr4/build/cpp/src/lr4 --run-tests || true; fi
          if [ -x lr4/build/cpp/src/Release/lr4 ]; then lr4/build/cpp/src/Release/lr4 --run-tests || true; fi
