name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure
        run: cmake -S lr4 -B lr4/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build lr4/build --config Release -- -j 2
      - name: Run tests
        run: ctest --test-dir lr4/build -C Release --output-on-failure
